<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Millie's Feeding Board</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --cream:        #faf7f2;
    --parchment:    #f0ebe0;
    --sand:         #e4dbd0;
    --sand-dark:    #c8bfb4;
    --bark:         #6b5a48;
    --bark-light:   #9c8878;
    --forest:       #2d5a3d;
    --forest-light: #3d7a53;
    --forest-pale:  #dff0e6;
    --amber:        #c97a06;
    --amber-pale:   #fef3c7;
    --rose:         #be3a4a;
    --rose-pale:    #fde8eb;
    --text-primary: #2c2318;
    --text-secondary:#7a6a5a;
    --text-light:   #a89888;
    --card-bg:      #ffffff;
    --shadow-sm:    0 1px 3px rgba(44,35,24,0.08);
    --shadow-md:    0 4px 16px rgba(44,35,24,0.10);
    --radius-sm:    6px;
    --radius-md:    10px;
    --radius-lg:    14px;
    --transition:   0.18s ease;
    --header-h:     68px;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  /* FULL-VIEWPORT LOCK — page never scrolls */
  html, body {
    height: 100%;
    overflow: hidden;
    font-family: 'DM Sans', sans-serif;
    background: var(--cream);
    color: var(--text-primary);
  }

  /* ---- HEADER ---- */
  .app-header {
    position: fixed;
    top: 0; left: 0; right: 0;
    height: var(--header-h);
    background: linear-gradient(135deg, #1e3d2a 0%, #2d5a3d 60%, #3d7a53 100%);
    color: #fff;
    z-index: 100;
    box-shadow: 0 2px 20px rgba(0,0,0,0.20);
    display: flex;
    align-items: center;
    padding: 0 14px;
  }

  .header-inner {
    width: 100%;
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .app-title {
    font-family: 'Playfair Display', serif;
    font-size: 1.05rem;
    font-weight: 700;
    white-space: nowrap;
    display: flex;
    flex-direction: column;
    flex-shrink: 0;
    line-height: 1.2;
  }
  .title-sub {
    font-size: 0.58rem;
    opacity: 0.5;
    font-weight: 300;
    letter-spacing: 0.07em;
    text-transform: uppercase;
  }

  .week-nav {
    display: flex;
    align-items: center;
    gap: 5px;
    flex-shrink: 0;
  }

  .week-label {
    font-family: 'Playfair Display', serif;
    font-size: 0.78rem;
    font-weight: 500;
    background: rgba(255,255,255,0.12);
    padding: 4px 11px;
    border-radius: 99px;
    white-space: nowrap;
  }

  .nav-btn {
    background: rgba(255,255,255,0.15);
    border: 1px solid rgba(255,255,255,0.22);
    color: #fff;
    padding: 4px 10px;
    border-radius: 99px;
    cursor: pointer;
    font-family: 'DM Sans', sans-serif;
    font-size: 0.72rem;
    font-weight: 500;
    transition: background var(--transition);
    white-space: nowrap;
  }
  .nav-btn:hover { background: rgba(255,255,255,0.28); }
  .nav-btn.today { background: rgba(255,255,255,0.88); color: var(--forest); font-weight: 600; }
  .nav-btn.today:hover { background: #fff; }
  .nav-btn:focus-visible { outline: 2px solid #fff; outline-offset: 2px; }

  .weekly-progress {
    display: flex;
    align-items: center;
    gap: 7px;
    font-size: 0.7rem;
    opacity: 0.9;
    margin-left: auto;
    flex-shrink: 0;
  }
  .progress-bar-track {
    width: 100px;
    height: 5px;
    background: rgba(255,255,255,0.2);
    border-radius: 99px;
    overflow: hidden;
  }
  .progress-bar-fill {
    height: 100%;
    background: #7ed99d;
    border-radius: 99px;
    transition: width 0.4s cubic-bezier(.4,0,.2,1);
  }
  .progress-label { white-space: nowrap; font-weight: 500; }

  .header-actions {
    display: flex;
    align-items: center;
    gap: 5px;
    flex-shrink: 0;
  }
  .hdr-btn {
    background: rgba(255,255,255,0.12);
    border: 1px solid rgba(255,255,255,0.2);
    color: rgba(255,255,255,0.8);
    padding: 4px 9px;
    border-radius: 99px;
    cursor: pointer;
    font-family: 'DM Sans', sans-serif;
    font-size: 0.7rem;
    font-weight: 500;
    white-space: nowrap;
    transition: all var(--transition);
  }
  .hdr-btn:hover { background: rgba(255,255,255,0.22); color: #fff; }
  .hdr-btn.reset-hdr:hover { background: rgba(190,58,74,0.55); color: #fff; }
  .hdr-btn:focus-visible { outline: 2px solid #fff; outline-offset: 2px; }

  /* ---- RULES POPOVER ---- */
  .rules-popover {
    position: fixed;
    top: calc(var(--header-h) + 6px);
    right: 14px;
    background: var(--card-bg);
    border: 1px solid var(--sand);
    border-radius: var(--radius-md);
    padding: 10px 14px 12px;
    box-shadow: 0 8px 28px rgba(44,35,24,0.14);
    z-index: 200;
    min-width: 250px;
    display: none;
  }
  .rules-popover.open { display: block; }
  .rules-popover h4 {
    font-size: 0.68rem;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.07em;
    color: var(--bark);
    margin-bottom: 7px;
  }
  .rules-popover ul { list-style: none; display: flex; flex-direction: column; gap: 5px; }
  .rules-popover li {
    font-size: 0.75rem;
    color: var(--text-secondary);
    display: flex;
    align-items: flex-start;
    gap: 6px;
    line-height: 1.4;
  }
  .rules-popover li::before { content: "🐾"; font-size: 0.68em; margin-top: 2px; }

  /* ---- BOARD ---- */
  .app-body {
    position: fixed;
    top: var(--header-h);
    left: 0; right: 0; bottom: 0;
    padding: 9px 9px 7px;
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    gap: 7px;
    overflow: hidden; /* outer container NEVER scrolls */
  }

  /* ---- DAY COLUMN ---- */
  .day-column {
    background: var(--card-bg);
    border-radius: var(--radius-lg);
    border: 1px solid var(--sand);
    box-shadow: var(--shadow-sm);
    display: flex;
    flex-direction: column;
    overflow: hidden;
    min-width: 0;
    transition: box-shadow var(--transition);
  }
  .day-column:hover { box-shadow: var(--shadow-md); }
  .day-column.today-col { border-color: var(--forest); border-width: 2px; }

  /* inner scroll — day column itself scrolls if content overflows */
  .day-scroll {
    flex: 1;
    overflow-y: auto;
    overflow-x: hidden;
    scrollbar-width: thin;
    scrollbar-color: var(--sand-dark) transparent;
  }
  .day-scroll::-webkit-scrollbar { width: 3px; }
  .day-scroll::-webkit-scrollbar-thumb { background: var(--sand-dark); border-radius: 99px; }

  /* DAY HEADER */
  .day-header {
    padding: 7px 9px 6px;
    background: var(--parchment);
    border-bottom: 1px solid var(--sand);
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-shrink: 0;
  }
  .day-name {
    font-family: 'Playfair Display', serif;
    font-weight: 700;
    font-size: 0.84rem;
    color: var(--text-primary);
    display: flex;
    align-items: center;
    gap: 4px;
  }
  .day-date {
    font-size: 0.62rem;
    color: var(--text-light);
    font-weight: 400;
    margin-top: 1px;
  }
  .today-badge {
    background: var(--forest);
    color: #fff;
    font-size: 0.52rem;
    font-weight: 600;
    padding: 1px 5px;
    border-radius: 99px;
    text-transform: uppercase;
    letter-spacing: 0.04em;
  }
  .day-progress-pills { display: flex; gap: 3px; }
  .day-pill {
    width: 7px; height: 7px;
    border-radius: 50%;
    background: var(--sand);
    transition: background 0.3s;
  }
  .day-pill.done    { background: var(--forest-light); }
  .day-pill.partial { background: var(--amber); }
  .day-pill.empty   { background: var(--rose); opacity: 0.4; }

  /* ---- FEEDING CARD ---- */
  .feeding-card {
    padding: 7px 9px 6px 12px;
    border-bottom: 1px solid var(--parchment);
    position: relative;
  }
  .feeding-card:last-child { border-bottom: none; }

  .feeding-card::before {
    content: '';
    position: absolute;
    left: 0; top: 7px; bottom: 7px;
    width: 3px;
    border-radius: 0 2px 2px 0;
    transition: background 0.3s;
  }
  .feeding-card.complete::before   { background: var(--forest-light); }
  .feeding-card.partial::before    { background: var(--amber); }
  .feeding-card.incomplete::before { background: var(--rose); opacity: 0.4; }

  .feeding-card-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 5px;
  }
  .feeding-time {
    display: flex;
    align-items: center;
    gap: 4px;
    font-weight: 600;
    font-size: 0.68rem;
    color: var(--text-secondary);
  }
  .time-icon { font-size: 0.78rem; line-height: 1; }

  .status-badge {
    font-size: 0.56rem;
    font-weight: 600;
    padding: 1px 6px;
    border-radius: 99px;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    transition: all 0.3s;
    white-space: nowrap;
  }
  .status-badge.complete   { background: var(--forest-pale); color: var(--forest); }
  .status-badge.partial    { background: var(--amber-pale);  color: var(--amber);  }
  .status-badge.incomplete { background: var(--rose-pale);   color: var(--rose);   }

  /* CHECKLIST */
  .checklist { list-style: none; display: flex; flex-direction: column; gap: 1px; }

  .checklist-item {
    display: flex;
    align-items: flex-start;
    gap: 5px;
    cursor: pointer;
    padding: 2px 3px;
    border-radius: 4px;
    transition: background var(--transition);
    min-height: 22px;
  }
  .checklist-item:hover { background: var(--parchment); }

  .checklist-item input[type="checkbox"] {
    appearance: none;
    -webkit-appearance: none;
    width: 13px; height: 13px;
    min-width: 13px;
    border: 1.5px solid var(--sand-dark);
    border-radius: 3px;
    cursor: pointer;
    margin-top: 2px;
    transition: all var(--transition);
    position: relative;
    background: #fff;
    flex-shrink: 0;
  }
  .checklist-item input[type="checkbox"]:checked {
    background: var(--forest);
    border-color: var(--forest);
  }
  .checklist-item input[type="checkbox"]:checked::after {
    content: '✓';
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%,-50%);
    color: #fff;
    font-size: 8px;
    font-weight: 700;
  }
  .checklist-item input[type="checkbox"]:focus-visible {
    outline: 2px solid var(--forest);
    outline-offset: 2px;
  }
  .checklist-item label {
    cursor: pointer;
    font-size: 0.68rem;
    color: var(--text-secondary);
    line-height: 1.35;
    flex: 1;
    transition: all var(--transition);
  }
  .checklist-item.checked label {
    text-decoration: line-through;
    color: var(--text-light);
  }

  /* medication badge */
  .med-tag {
    display: inline-block;
    font-size: 0.52rem;
    font-weight: 700;
    background: #e8f0fe;
    color: #3b5bdb;
    padding: 1px 4px;
    border-radius: 3px;
    text-transform: uppercase;
    letter-spacing: 0.04em;
    margin-left: 3px;
    vertical-align: middle;
  }

  .last-updated {
    margin-top: 3px;
    font-size: 0.58rem;
    color: var(--text-light);
  }

  /* ---- CONFIRM DIALOG ---- */
  .overlay {
    position: fixed; inset: 0;
    background: rgba(44,35,24,0.45);
    z-index: 300;
    display: flex; align-items: center; justify-content: center;
    backdrop-filter: blur(2px);
    opacity: 0; pointer-events: none;
    transition: opacity 0.2s;
  }
  .overlay.active { opacity: 1; pointer-events: all; }
  .dialog {
    background: var(--card-bg);
    border-radius: var(--radius-lg);
    padding: 22px 22px 18px;
    max-width: 320px; width: 90%;
    box-shadow: 0 8px 32px rgba(44,35,24,0.18);
    transform: translateY(8px);
    transition: transform 0.22s ease;
  }
  .overlay.active .dialog { transform: translateY(0); }
  .dialog h3 { font-family: 'Playfair Display', serif; font-size: 1.05rem; margin-bottom: 7px; }
  .dialog p  { font-size: 0.81rem; color: var(--text-secondary); margin-bottom: 16px; line-height: 1.55; }
  .dialog-btns { display: flex; gap: 8px; justify-content: flex-end; }
  .btn-cancel {
    padding: 6px 14px; border: 1px solid var(--sand-dark); background: none;
    border-radius: 99px; cursor: pointer; font-family: 'DM Sans', sans-serif;
    font-size: 0.8rem; color: var(--text-secondary); transition: all var(--transition);
  }
  .btn-cancel:hover { background: var(--parchment); }
  .btn-confirm {
    padding: 6px 14px; border: none; background: var(--rose); color: #fff;
    border-radius: 99px; cursor: pointer; font-family: 'DM Sans', sans-serif;
    font-size: 0.8rem; font-weight: 600; transition: all var(--transition);
  }
  .btn-confirm:hover { background: #a63040; }

  /* past week toast */
  .past-notice {
    position: fixed; bottom: 10px; left: 50%; transform: translateX(-50%);
    background: var(--parchment); border: 1px solid var(--sand-dark);
    border-radius: 99px; padding: 5px 14px;
    font-size: 0.72rem; color: var(--bark-light);
    z-index: 50; box-shadow: var(--shadow-sm); white-space: nowrap;
  }

  /* entry animation */
  @keyframes fadeUp {
    from { opacity:0; transform:translateY(5px); }
    to   { opacity:1; transform:translateY(0); }
  }
  .day-column { animation: fadeUp 0.28s ease both; }
  .day-column:nth-child(1){animation-delay:.02s}
  .day-column:nth-child(2){animation-delay:.05s}
  .day-column:nth-child(3){animation-delay:.08s}
  .day-column:nth-child(4){animation-delay:.11s}
  .day-column:nth-child(5){animation-delay:.14s}
  .day-column:nth-child(6){animation-delay:.17s}
  .day-column:nth-child(7){animation-delay:.20s}
</style>
</head>
<body>

<!-- Confirm reset -->
<div class="overlay" id="resetOverlay" role="dialog" aria-modal="true" aria-labelledby="dialogTitle">
  <div class="dialog">
    <h3 id="dialogTitle">Reset this week?</h3>
    <p>All checked items for this week will be cleared. This cannot be undone.</p>
    <div class="dialog-btns">
      <button class="btn-cancel" id="cancelReset">Cancel</button>
      <button class="btn-confirm" id="confirmReset">Yes, reset</button>
    </div>
  </div>
</div>

<!-- Rules popover -->
<div class="rules-popover" id="rulesPopover" role="tooltip">
  <h4>🐶 Quick Feeding Rules</h4>
  <ul id="rulesList"></ul>
</div>

<!-- Fixed header -->
<header class="app-header">
  <div class="header-inner">
    <div class="app-title">
      🐾 Millie's Feeding Board
      <span class="title-sub">Weekly schedule · Central Time</span>
    </div>

    <div class="week-nav">
      <button class="nav-btn" id="prevWeekBtn" aria-label="Previous week">← Prev</button>
      <span class="week-label" id="weekLabel">…</span>
      <button class="nav-btn" id="nextWeekBtn" aria-label="Next week">Next →</button>
      <button class="nav-btn today" id="todayBtn" style="display:none">Today</button>
    </div>

    <div class="weekly-progress">
      <div class="progress-bar-track" role="progressbar" aria-label="Weekly feeding progress" aria-valuenow="0" aria-valuemin="0" aria-valuemax="100">
        <div class="progress-bar-fill" id="weekProgressBar" style="width:0%"></div>
      </div>
      <span class="progress-label" id="weekProgressLabel">0 / 14</span>
    </div>

    <div class="header-actions">
      <button class="hdr-btn" id="rulesToggleBtn" aria-expanded="false" aria-controls="rulesPopover">Rules ▾</button>
      <button class="hdr-btn reset-hdr" id="resetWeekBtn">↺ Reset week</button>
    </div>
  </div>
</header>

<!-- Board: 7 columns, fills remaining viewport -->
<main class="app-body" id="appBody" aria-label="Weekly feeding board"></main>

<script>
/* =========================================================
   SCHEDULE DEFINITION
   AM items include isMed flag for medication highlighting.
   PM items are per-weekday strings, normalized to objects at runtime.
   ========================================================= */
const SCHEDULE = {
  AM: {
    icon: "☀️",
    items: [
      { text: "¾ cup kibble" },
      { text: "1 Cosequin tablet" },
      { text: "1 pump omega oil" },
      { text: "½ Apoquel tablet", isMed: true }
    ]
  },
  PM: {
    icon: "🌙",
    byDay: {
      Monday:    ["¾ cup kibble","Bone broth (2–3 tbsp)","1 Cosequin tablet","1–2 pumps omega oil"],
      Tuesday:   ["¾ cup kibble","Protein topper (2–3 tbsp chicken/beef)","1 Cosequin tablet","1–2 pumps omega oil"],
      Wednesday: ["¾ cup kibble","Pumpkin (1–2 tbsp)","1 Cosequin tablet","1–2 pumps omega oil"],
      Thursday:  ["¾ cup kibble","Bone broth","1 Cosequin tablet","1–2 pumps omega oil"],
      Friday:    ["¾ cup kibble","Protein topper + small veggies","1 Cosequin tablet","1–2 pumps omega oil"],
      Saturday:  ["¾ cup kibble","Egg","1 Cosequin tablet","1–2 pumps omega oil"],
      Sunday:    ["¾ cup kibble","Pumpkin (1–2 tbsp) or skip for light day","1 Cosequin tablet","1–2 pumps omega oil"]
    }
  }
};

const QUICK_RULES = [
  "Reduce kibble ~10–15% on topper days",
  "Pumpkin = plain only (not pie mix)",
  "Bone broth = no onion/garlic"
];

const DAY_NAMES = ["Monday","Tuesday","Wednesday","Thursday","Friday","Saturday","Sunday"];

/* =========================================================
   STATE — localStorage key "millie_state_v2"
   Structure:
   {
     weeks: {
       "YYYY-MM-DD": {           // Monday of week
         Monday: {
           AM: { checked: { "0": true, ... }, lastUpdated: ISO },
           PM: { checked: {}, lastUpdated: null }
         }, ...
       }
     }
   }
   ========================================================= */
let appState = { weeks: {} };

function loadState() {
  try { const r = localStorage.getItem("millie_state_v2"); if (r) appState = JSON.parse(r); }
  catch(e) { appState = { weeks: {} }; }
}
function saveState() {
  try { localStorage.setItem("millie_state_v2", JSON.stringify(appState)); } catch(e) {}
}
function getFeedingState(weekKey, dayName, slot) {
  if (!appState.weeks[weekKey]) appState.weeks[weekKey] = {};
  if (!appState.weeks[weekKey][dayName]) appState.weeks[weekKey][dayName] = {};
  if (!appState.weeks[weekKey][dayName][slot])
    appState.weeks[weekKey][dayName][slot] = { checked: {}, lastUpdated: null };
  return appState.weeks[weekKey][dayName][slot];
}
function toggleItem(weekKey, dayName, slot, idx) {
  const f = getFeedingState(weekKey, dayName, slot);
  f.checked[idx] = !f.checked[idx];
  f.lastUpdated = new Date().toISOString();
  saveState();
  renderFeeding(weekKey, dayName, slot);
  updateWeekProgress(weekKey);
}
function resetWeek(weekKey) {
  appState.weeks[weekKey] = {};
  saveState();
  renderBoard(weekKey);
  updateWeekProgress(weekKey);
}

/* =========================================================
   DATE UTILITIES
   ========================================================= */
function getMondayOf(d) {
  const x = new Date(d); const day = x.getDay();
  x.setDate(x.getDate() + (day === 0 ? -6 : 1 - day));
  x.setHours(0,0,0,0); return x;
}
function toISODate(d) {
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}
function formatShort(d) { return d.toLocaleDateString('en-US',{month:'short',day:'numeric'}); }
function shiftWeek(mon, n) { const d=new Date(mon); d.setDate(d.getDate()+n*7); return d; }
function getWeekDates(mon) {
  return DAY_NAMES.map((_,i)=>{ const d=new Date(mon); d.setDate(d.getDate()+i); return d; });
}

/* =========================================================
   ITEMS HELPER
   ========================================================= */
function getItems(dayName, slot) {
  if (slot === 'AM') return SCHEDULE.AM.items;
  return (SCHEDULE.PM.byDay[dayName] || []).map(t => ({ text: t }));
}

/* =========================================================
   COMPLETION
   ========================================================= */
function getStatus(weekKey, dayName, slot) {
  const items = getItems(dayName, slot);
  const st = getFeedingState(weekKey, dayName, slot);
  const n = items.filter((_,i) => st.checked[i]).length;
  if (n === 0) return 'incomplete';
  if (n === items.length) return 'complete';
  return 'partial';
}
function getWeekStats(weekKey) {
  let c = 0;
  DAY_NAMES.forEach(d => ['AM','PM'].forEach(s => { if (getStatus(weekKey,d,s)==='complete') c++; }));
  return { total: 14, complete: c };
}

/* =========================================================
   RENDER
   ========================================================= */
let currentMonday = getMondayOf(new Date());
let currentWeekKey = toISODate(currentMonday);

function renderApp() { renderHeader(); renderBoard(currentWeekKey); updateWeekProgress(currentWeekKey); }

function renderHeader() {
  const sun = new Date(currentMonday); sun.setDate(sun.getDate()+6);
  document.getElementById('weekLabel').textContent = `${formatShort(currentMonday)} – ${formatShort(sun)}`;
  const isNow = toISODate(currentMonday) === toISODate(getMondayOf(new Date()));
  document.getElementById('todayBtn').style.display = isNow ? 'none' : '';
  // past week notice
  const old = document.getElementById('pastNotice'); if (old) old.remove();
  if (currentMonday < getMondayOf(new Date())) {
    const n = document.createElement('div');
    n.className = 'past-notice'; n.id = 'pastNotice';
    n.textContent = '📋 Viewing a past week — history preserved as saved';
    document.body.appendChild(n);
  }
}

function renderBoard(weekKey) {
  const body = document.getElementById('appBody'); body.innerHTML = '';
  const dates = getWeekDates(currentMonday);
  const today = new Date(); today.setHours(0,0,0,0);
  DAY_NAMES.forEach((name,i) => body.appendChild(buildDayColumn(weekKey, name, dates[i], dates[i].getTime()===today.getTime())));
}

function buildDayColumn(weekKey, dayName, dateObj, isToday) {
  const col = document.createElement('div');
  col.className = 'day-column' + (isToday ? ' today-col' : '');
  col.id = `col-${dayName}`;

  // header
  const hdr = document.createElement('div'); hdr.className = 'day-header';
  const left = document.createElement('div');
  const ne = document.createElement('div'); ne.className = 'day-name';
  ne.textContent = dayName.slice(0,3);
  if (isToday) { const b=document.createElement('span'); b.className='today-badge'; b.textContent='Today'; ne.appendChild(b); }
  const de = document.createElement('div'); de.className='day-date'; de.textContent=formatShort(dateObj);
  left.appendChild(ne); left.appendChild(de);

  const pills = document.createElement('div'); pills.className='day-progress-pills'; pills.id=`pills-${dayName}`;
  ['AM','PM'].forEach(s=>{
    const p=document.createElement('div'); p.className='day-pill'; p.id=`pill-${dayName}-${s}`; pills.appendChild(p);
  });

  hdr.appendChild(left); hdr.appendChild(pills); col.appendChild(hdr);

  // scrollable content
  const scroll = document.createElement('div'); scroll.className='day-scroll';
  ['AM','PM'].forEach(s => scroll.appendChild(buildFeedingCard(weekKey, dayName, s)));
  col.appendChild(scroll);

  updateDayPills(weekKey, dayName);
  return col;
}

function buildFeedingCard(weekKey, dayName, slot) {
  const items = getItems(dayName, slot);
  const fs = getFeedingState(weekKey, dayName, slot);
  const status = getStatus(weekKey, dayName, slot);

  const card = document.createElement('div');
  card.className = `feeding-card ${status}`;
  card.id = `card-${dayName}-${slot}`;

  const ch = document.createElement('div'); ch.className = 'feeding-card-header';
  const te = document.createElement('div'); te.className = 'feeding-time';
  te.innerHTML = `<span class="time-icon">${slot==='AM'?'☀️':'🌙'}</span><span>${slot==='AM'?'7 AM':'5 PM'} CT</span>`;
  const badge = document.createElement('span');
  badge.className = `status-badge ${status}`; badge.id = `badge-${dayName}-${slot}`;
  badge.textContent = status==='complete'?'Done':status==='partial'?'Partial':'Pending';
  ch.appendChild(te); ch.appendChild(badge); card.appendChild(ch);

  const list = document.createElement('ul'); list.className='checklist'; list.id=`checklist-${dayName}-${slot}`;
  items.forEach((item, i) => {
    const checked = !!fs.checked[i];
    const li = document.createElement('li');
    li.className = 'checklist-item' + (checked ? ' checked' : '');
    li.id = `item-${dayName}-${slot}-${i}`;
    const cbId = `cb-${dayName}-${slot}-${i}`;
    const cb = document.createElement('input');
    cb.type='checkbox'; cb.id=cbId; cb.checked=checked;
    cb.setAttribute('aria-label', item.text);
    cb.addEventListener('change', ()=>toggleItem(weekKey, dayName, slot, i));
    const lbl = document.createElement('label'); lbl.htmlFor=cbId;
    lbl.textContent = item.text;
    if (item.isMed) {
      const tag = document.createElement('span'); tag.className='med-tag'; tag.textContent='Rx';
      lbl.appendChild(tag);
    }
    li.appendChild(cb); li.appendChild(lbl);
    li.addEventListener('click', e=>{ if(e.target!==cb && e.target!==lbl) cb.click(); });
    list.appendChild(li);
  });
  card.appendChild(list);

  if (fs.lastUpdated) {
    const lu = document.createElement('div'); lu.className='last-updated'; lu.id=`lu-${dayName}-${slot}`;
    lu.textContent = `⏱ ${formatTimeAgo(fs.lastUpdated)}`;
    card.appendChild(lu);
  }
  return card;
}

function renderFeeding(weekKey, dayName, slot) {
  const old = document.getElementById(`card-${dayName}-${slot}`); if(!old) return;
  old.replaceWith(buildFeedingCard(weekKey, dayName, slot));
  updateDayPills(weekKey, dayName);
}

function updateDayPills(weekKey, dayName) {
  ['AM','PM'].forEach(s=>{
    const p=document.getElementById(`pill-${dayName}-${s}`); if(!p) return;
    const st=getStatus(weekKey,dayName,s);
    p.className='day-pill '+(st==='complete'?'done':st==='partial'?'partial':'empty');
  });
}

function updateWeekProgress(weekKey) {
  const {total,complete}=getWeekStats(weekKey);
  const pct=Math.round(complete/total*100);
  const bar=document.getElementById('weekProgressBar'); const lbl=document.getElementById('weekProgressLabel');
  if(bar){bar.style.width=pct+'%'; bar.parentElement.setAttribute('aria-valuenow',pct);}
  if(lbl) lbl.textContent=`${complete} / ${total}`;
}

/* =========================================================
   RULES POPOVER
   ========================================================= */
const rulesPopover = document.getElementById('rulesPopover');
const rulesToggleBtn = document.getElementById('rulesToggleBtn');
const rulesList = document.getElementById('rulesList');
QUICK_RULES.forEach(r => { const li=document.createElement('li'); li.textContent=r; rulesList.appendChild(li); });

rulesToggleBtn.addEventListener('click', e => {
  e.stopPropagation();
  const open = rulesPopover.classList.toggle('open');
  rulesToggleBtn.setAttribute('aria-expanded', open);
  rulesToggleBtn.textContent = open ? 'Rules ▴' : 'Rules ▾';
});
document.addEventListener('click', e => {
  if (!rulesPopover.contains(e.target) && e.target !== rulesToggleBtn) {
    rulesPopover.classList.remove('open');
    rulesToggleBtn.textContent = 'Rules ▾';
  }
});

/* =========================================================
   RESET DIALOG
   ========================================================= */
document.getElementById('resetWeekBtn').addEventListener('click', () => showResetDialog(currentWeekKey));
function showResetDialog(weekKey) {
  const ov=document.getElementById('resetOverlay'); ov.classList.add('active');
  document.getElementById('confirmReset').onclick = ()=>{ resetWeek(weekKey); ov.classList.remove('active'); };
  document.getElementById('cancelReset').onclick  = ()=>ov.classList.remove('active');
  ov.onclick = e=>{ if(e.target===ov) ov.classList.remove('active'); };
}

/* =========================================================
   WEEK NAVIGATION
   ========================================================= */
document.getElementById('prevWeekBtn').addEventListener('click', ()=>{
  currentMonday=shiftWeek(currentMonday,-1); currentWeekKey=toISODate(currentMonday); renderApp();
});
document.getElementById('nextWeekBtn').addEventListener('click', ()=>{
  currentMonday=shiftWeek(currentMonday,1); currentWeekKey=toISODate(currentMonday); renderApp();
});
document.getElementById('todayBtn').addEventListener('click', ()=>{
  currentMonday=getMondayOf(new Date()); currentWeekKey=toISODate(currentMonday); renderApp();
});

/* =========================================================
   UTILITIES
   ========================================================= */
function formatTimeAgo(iso) {
  try {
    const m=Math.floor((Date.now()-new Date(iso).getTime())/60000);
    if(m<1) return 'just now'; if(m<60) return `${m}m ago`;
    const h=Math.floor(m/60); if(h<24) return `${h}h ago`;
    return `${Math.floor(h/24)}d ago`;
  } catch{return '';}
}

/* =========================================================
   INIT
   ========================================================= */
loadState();
renderApp();
</script>
